# Example REST polling connector. Replace url and paths for your API.
# JSON: price_path/volume_path use dot notation (e.g. "data.close", "data.volume").
# CSV: price_path/volume_path are column names.

[connector.rest]
url = "https://api.example.com/ticker"
poll_interval_ms = 1000
price_path = "price"
volume_path = "volume"
response_format = "json"

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000.0
volume_min = 0.0
volume_max = 10000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
replay_mode = false
drop_on_parse_error = true

[output]
accepted_path = "out/v2_rest_accepted.csv"
dead_letter_path = "out/v2_rest_dead.csv"
