[connector.csv]
input_path = "examples/sample_input.csv"
has_headers = true

[normalizer]
price_field = "price"
volume_field = "volume"

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000000.0
volume_min = 0.0
volume_max = 1000000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
drop_on_parse_error = true

[output]
accepted_path = "out/accepted_ticks.csv"
dead_letter_path = "out/dead_letter.csv"
