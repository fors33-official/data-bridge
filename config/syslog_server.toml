# Syslog Server Connector Configuration
# This template starts a syslog server listening on port 514 (RFC 5424 standard)
# Supports both RFC 5424 (structured) and RFC 3164 (legacy) syslog formats

[connector.syslog]
bind = "0.0.0.0"  # Listen on all interfaces
port = 514  # Default syslog port (RFC 5424)
protocol = "tcp"  # Options: "tcp" or "udp"
format = "rfc5424"  # Options: "rfc5424" (structured) or "rfc3164" (legacy)

[normalizer]
field_count = 2
# Adjust field_count based on your syslog message structure
# Syslog messages are parsed and metrics extracted from the message content

[normalizer.field_map]
"metric_0" = 0
"metric_1" = 1

[filter]
reject_nan_inf = true
replay_mode = false
drop_on_parse_error = true
fail_fast = true
future_tolerance_ms = 60000
stale_tolerance_ms = 300000

[output]
accepted_path = "out/syslog_accepted.csv"
dead_letter_path = "out/syslog_dead.csv"

[output.headers]
headers = ["metric_0", "metric_1"]
