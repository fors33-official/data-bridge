# gRPC Client Connector Configuration
# This template connects to a gRPC server on the default port 50051
# Metrics come from the gRPC stream (proto); align [output.headers] with server metric order

[connector.grpc]
url = "https://grpc.example.com:50051"  # Default gRPC port
service = "datastream.DataStream"
# For authentication, use env_metadata
[connector.grpc.env_metadata]
"authorization" = "T3THR_GRPC_AUTH_TOKEN"  # Set this environment variable

[normalizer]
field_count = 2
# Adjust field_count based on your gRPC stream message structure

[normalizer.field_map]
"metric_0" = 0
"metric_1" = 1

[filter]
reject_nan_inf = true
replay_mode = false
drop_on_parse_error = true
fail_fast = true
future_tolerance_ms = 60000
stale_tolerance_ms = 300000

[output]
accepted_path = "out/grpc_accepted.csv"
dead_letter_path = "out/grpc_dead.csv"

[output.headers]
headers = ["metric_0", "metric_1"]
