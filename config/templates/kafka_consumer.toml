[connector.message_bus]
provider = "kafka"
field_paths = ["price", "volume"]

[connector.message_bus.kafka]
bootstrap_servers = "localhost:9092"
topic = "market-ticks"
group_id = "t3thr-consumer"
# SASL credentials are populated at runtime via the
# FORS33_SECRET_CONNECTOR__MESSAGE_BUS__KAFKA__SASL_USERNAME / SASL_PASSWORD env
# overlay; they never live in the on-disk TOML.
sasl_username = "${FORS33_SECRET_CONNECTOR__MESSAGE_BUS__KAFKA__SASL_USERNAME}"
sasl_password = "${FORS33_SECRET_CONNECTOR__MESSAGE_BUS__KAFKA__SASL_PASSWORD}"

[normalizer]
field_count = 2
field_map = { price = 0, volume = 1 }

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000.0
volume_min = 0.0
volume_max = 10000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
replay_mode = false
drop_on_parse_error = true

[output]
accepted_path = "out/kafka_accepted.csv"
dead_letter_path = "out/kafka_dead.csv"
