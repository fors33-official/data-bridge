[connector.file]
input_path = "/host/input.csv"
format = "csv"
has_headers = true

[normalizer]
price_field = "price"
volume_field = "volume"
timestamp_field = "timestamp"
timestamp_format = "%Y-%m-%d %H:%M:%S"

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000.0
volume_min = 0.0
volume_max = 10000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
replay_mode = true
drop_on_parse_error = true

[output]
accepted_path = "out/file_batch_accepted.csv"
dead_letter_path = "out/file_batch_dead.csv"
