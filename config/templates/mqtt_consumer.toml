[connector.message_bus]
provider = "mqtt"
field_paths = ["price", "volume"]

[connector.message_bus.mqtt]
broker = "localhost:1883"
topic = "market/ticks"
timestamp_path = "ts"
username = "${FORS33_SECRET_CONNECTOR__MESSAGE_BUS__MQTT__USERNAME}"
password = "${FORS33_SECRET_CONNECTOR__MESSAGE_BUS__MQTT__PASSWORD}"

[normalizer]
field_count = 2
field_map = { price = 0, volume = 1 }

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000.0
volume_min = 0.0
volume_max = 10000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
replay_mode = false
drop_on_parse_error = true

[output]
accepted_path = "out/mqtt_accepted.csv"
dead_letter_path = "out/mqtt_dead.csv"
