[connector.websocket]
provider = "infura"
# Replace `<YOUR_INFURA_PROJECT_ID>` with your Infura project ID. The full URL
# is regular configuration; only auth-bearing fields (token / api_key / custom
# auth headers) flow through the FORS33 secret env-var pipeline.
url = "wss://mainnet.infura.io/ws/v3/<YOUR_INFURA_PROJECT_ID>"
subscription = "newHeads"

[normalizer]
price_field = "baseFeePerGas"
volume_field = "gasUsed"

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000000.0
volume_min = 0.0
volume_max = 1000000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
replay_mode = false
drop_on_parse_error = true

[output]
accepted_path = "out/infura_accepted.csv"
dead_letter_path = "out/infura_dead.csv"
