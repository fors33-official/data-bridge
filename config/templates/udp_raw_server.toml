[connector.udp_raw]
bind_address = "0.0.0.0"
port = 514
max_datagram_bytes = 65535
field_paths = ["metric_0", "metric_1"]

[normalizer]
field_count = 2
field_map = { metric_0 = 0, metric_1 = 1 }

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000.0
volume_min = 0.0
volume_max = 10000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
replay_mode = false
drop_on_parse_error = true

[output]
accepted_path = "out/udp_raw_accepted.csv"
dead_letter_path = "out/udp_raw_dead.csv"
