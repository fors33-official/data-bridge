[connector.websocket]
provider = "binance"
url = "wss://stream.binance.com:9443/ws/btcusdt@trade"
stream = "btcusdt@trade"

[normalizer]
price_field = "p"
volume_field = "q"

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000.0
volume_min = 0.0
volume_max = 10000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
replay_mode = false
drop_on_parse_error = true

[output]
accepted_path = "out/binance_accepted.csv"
dead_letter_path = "out/binance_dead.csv"
