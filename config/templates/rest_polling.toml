[connector.rest]
url = "https://example.com/api/ticker"
poll_interval_ms = 1000
price_path = "price"
volume_path = "volume"
response_format = "json"

[filter]
reject_nan_inf = true
price_min = 0.0
price_max = 1000000.0
volume_min = 0.0
volume_max = 10000000.0
volume_burst_max_ratio = 10000.0
burst_ema_alpha = 0.05
future_tolerance_ms = 2000
stale_tolerance_ms = 600000
replay_mode = false
drop_on_parse_error = true

[output]
accepted_path = "out/rest_accepted.csv"
dead_letter_path = "out/rest_dead.csv"
