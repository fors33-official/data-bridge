name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.4.0)'
        required: true
        type: string
      tag_latest:
        description: 'Tag as latest'
        required: false
        default: true
        type: boolean
      tag_main:
        description: 'Tag as main'
        required: false
        default: true
        type: boolean

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: pkg/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            fors33/data-bridge:${{ inputs.version }}
            ${{ inputs.tag_latest && 'fors33/data-bridge:latest' || '' }}
            ${{ inputs.tag_main && 'fors33/data-bridge:main' || '' }}
            ghcr.io/fors33-official/data-bridge:${{ inputs.version }}
            ${{ inputs.tag_latest && 'ghcr.io/fors33-official/data-bridge:latest' || '' }}
            ${{ inputs.tag_main && 'ghcr.io/fors33-official/data-bridge:main' || '' }}
