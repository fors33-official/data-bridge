name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.6.0)'
        required: true
        type: string
      tag_latest:
        description: 'Tag as latest'
        required: false
        default: true
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --features full_engine

      - name: Slim release build
        run: cargo build --release

      - name: Full engine release build
        run: cargo build --release --features full_engine

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$CARGO_VER" != "${{ inputs.version }}" ]; then
            echo "Cargo.toml version ($CARGO_VER) does not match workflow input (${{ inputs.version }})"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pkg/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: fors33/data-bridge:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Validate image config
        run: |
          docker run --rm fors33/data-bridge:${{ inputs.version }} \
            run --validate-only --config /app/config/default.toml

      - name: Push to Docker Hub and GHCR
        run: |
          VERSION="${{ inputs.version }}"
          docker tag "fors33/data-bridge:${VERSION}" "ghcr.io/fors33-official/data-bridge:${VERSION}"
          docker push "fors33/data-bridge:${VERSION}"
          docker push "ghcr.io/fors33-official/data-bridge:${VERSION}"
          if [ "${{ inputs.tag_latest }}" = "true" ]; then
            docker tag "fors33/data-bridge:${VERSION}" fors33/data-bridge:latest
            docker tag "fors33/data-bridge:${VERSION}" ghcr.io/fors33-official/data-bridge:latest
            docker push fors33/data-bridge:latest
            docker push ghcr.io/fors33-official/data-bridge:latest
          fi

      - name: Update Docker Hub repository description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: fors33/data-bridge
          readme-filepath: ./README.md
          enable-url-completion: true
          short-description: Config-driven ingestion and normalization for file, batch, and live connectors.
